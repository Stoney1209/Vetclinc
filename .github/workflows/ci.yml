name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint monorepo
        run: pnpm lint

      - name: Run API tests
        run: pnpm --filter @vetclinic/api exec jest --ci --maxWorkers=2

      - name: Run Web tests
        run: pnpm --filter vetclinic/web test

      - name: Build monorepo
        run: pnpm build
